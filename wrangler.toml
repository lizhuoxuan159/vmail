name = "vmail"
main = "worker/src/index.ts"

# 打包配置
minify = true
compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2025-03-01"
keep_vars = true

# 启用 D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "${email}"
database_id = "${b1fd93da-4a38-4b57-99d5-96d5c436978e}"
# fix: 将迁移目录直接配置在这里，这是 D1 自动迁移的标准做法
migrations_dir = "worker/drizzle"

# 定义环境变量和密钥
[vars]
EMAIL_DOMAIN = "${mail.lizhuoxuan.dpdns.org}"
TURNSTILE_KEY = "${}"
COOKIES_SECRET = "${b1fd93da4a384b5799d596d5c436978e1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d}"
TURNSTILE_SECRET = "${}"
PASSWORD = "${5201314Lzx@.}"
API_RATE_LIMIT_PER_MINUTE = "${60}"
SHOW_AFF = "${false}"
ENABLE_OPENAPI = "${false}"

# 配置邮件处理
[triggers]
crons = ["0 * * * *"] # 每小时运行一次清理任务

# 构建配置
[build]
command = "pnpm run build"

# 静态资源配置
[assets]
binding = "ASSETS"
directory = "frontend/build/client"
